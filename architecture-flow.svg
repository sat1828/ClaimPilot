<svg viewBox="0 0 1100 600" xmlns="http://www.w3.org/2000/svg" width="1100" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d18"/>
      <stop offset="100%" style="stop-color:#0c1520"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff88"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff4444"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffaa00"/>
    </marker>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#1a2a3a" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1100" height="600" fill="url(#bg2)"/>
  <rect width="1100" height="600" fill="url(#dots)"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#4a7090" letter-spacing="6">SYSTEM ARCHITECTURE — DATA FLOW</text>
  <line x1="200" y1="42" x2="900" y2="42" stroke="#1a3050" stroke-width="1"/>

  <!-- ===== LAYER 0: INPUT ===== -->
  <text x="60" y="80" font-family="monospace" font-size="9" fill="#2a4060" letter-spacing="2">INPUT LAYER</text>
  
  <!-- Email input -->
  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="#0d1e35" stroke="#1a4060" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" font-family="monospace" font-size="18" fill="#4a7090">📧</text>
    <text x="50" y="40" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7090">Email</text>
    <text x="50" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#2a4060">SMTP/IMAP</text>
  </g>

  <!-- Upload portal input -->
  <g transform="translate(145, 90)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="#0d1e35" stroke="#1a4060" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" font-family="monospace" font-size="18" fill="#4a7090">📁</text>
    <text x="50" y="40" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7090">Upload Portal</text>
    <text x="50" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#2a4060">PDF · Audio · Text</text>
  </g>

  <!-- Merge lines to intake -->
  <line x1="80" y1="150" x2="80" y2="180" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="195" y1="150" x2="195" y2="165" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="195" y1="165" x2="80" y2="175" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ===== LAYER 1: INTAKE AGENT ===== -->
  <text x="60" y="200" font-family="monospace" font-size="9" fill="#007090" letter-spacing="2">AGENT 01</text>
  
  <g transform="translate(20, 210)" filter="url(#softglow)">
    <rect x="0" y="0" width="200" height="90" rx="10" fill="#0a1a30" stroke="#00d4ff" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="25" rx="10" fill="#0d2840"/>
    <rect x="0" y="15" width="200" height="10" fill="#0d2840"/>
    <text x="100" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" font-weight="bold" letter-spacing="2">INTAKE AGENT</text>
    <!-- Tools list -->
    <text x="15" y="42" font-family="monospace" font-size="8" fill="#4a7090">▸ PyMuPDF — PDF parsing</text>
    <text x="15" y="54" font-family="monospace" font-size="8" fill="#4a7090">▸ Whisper — audio → text</text>
    <text x="15" y="66" font-family="monospace" font-size="8" fill="#4a7090">▸ Claude extraction — NER</text>
    <text x="15" y="78" font-family="monospace" font-size="8" fill="#4a7090">▸ Structured ClaimState emit</text>
    <!-- Animated indicator -->
    <circle cx="185" cy="12" r="5" fill="#00d4ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Down arrow 1 -->
  <line x1="120" y1="300" x2="120" y2="330" stroke="#00d4ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlue)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- ===== LAYER 2: VALIDATION AGENT ===== -->
  <text x="60" y="350" font-family="monospace" font-size="9" fill="#5020a0" letter-spacing="2">AGENT 02</text>
  
  <g transform="translate(20, 360)" filter="url(#softglow)">
    <rect x="0" y="0" width="200" height="90" rx="10" fill="#0a0a2a" stroke="#7c3aed" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="25" rx="10" fill="#150a30"/>
    <rect x="0" y="15" width="200" height="10" fill="#150a30"/>
    <text x="100" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="bold" letter-spacing="1">VALIDATION AGENT</text>
    <text x="15" y="42" font-family="monospace" font-size="8" fill="#4a7090">▸ Pinecone hybrid search</text>
    <text x="15" y="54" font-family="monospace" font-size="8" fill="#4a7090">▸ BM25 + dense embedding</text>
    <text x="15" y="66" font-family="monospace" font-size="8" fill="#4a7090">▸ Policy eligibility check</text>
    <text x="15" y="78" font-family="monospace" font-size="8" fill="#4a7090">▸ Date/coverage validation</text>
    <circle cx="185" cy="12" r="5" fill="#7c3aed" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Fork arrows from validation -->
  <line x1="120" y1="450" x2="120" y2="470" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Fork right -->
  <line x1="120" y1="470" x2="350" y2="470" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Fork left stays at 120 -->
  
  <!-- Down to investigation (left branch) -->
  <line x1="120" y1="470" x2="120" y2="490" stroke="#0066ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Right to fraud (from 350,470) -->
  <line x1="350" y1="470" x2="350" y2="490" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- ===== LAYER 3: PARALLEL AGENTS ===== -->
  <text x="45" y="510" font-family="monospace" font-size="9" fill="#002090" letter-spacing="2">AGENT 03</text>
  <text x="290" y="510" font-family="monospace" font-size="9" fill="#900020" letter-spacing="2">AGENT 04</text>

  <g transform="translate(20, 518)" filter="url(#softglow)">
    <rect x="0" y="0" width="200" height="65" rx="10" fill="#050a25" stroke="#0066ff" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="20" rx="10" fill="#08102a"/>
    <rect x="0" y="14" width="200" height="6" fill="#08102a"/>
    <text x="100" y="13" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa" font-weight="bold" letter-spacing="1">INVESTIGATION AGENT</text>
    <text x="15" y="32" font-family="monospace" font-size="7" fill="#4a7090">▸ OpenWeather ▸ FHIR R4</text>
    <text x="15" y="43" font-family="monospace" font-size="7" fill="#4a7090">▸ Tavily web search</text>
    <text x="15" y="54" font-family="monospace" font-size="7" fill="#4a7090">▸ Google Geocoding API</text>
    <circle cx="185" cy="10" r="4" fill="#0066ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(240, 518)" filter="url(#softglow)">
    <rect x="0" y="0" width="220" height="65" rx="10" fill="#250505" stroke="#ff4444" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="20" rx="10" fill="#300808"/>
    <rect x="0" y="14" width="220" height="6" fill="#300808"/>
    <text x="110" y="13" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171" font-weight="bold" letter-spacing="1">FRAUD DETECTION AGENT</text>
    <text x="15" y="32" font-family="monospace" font-size="7" fill="#4a7090">▸ IsolationForest (10K train)</text>
    <text x="15" y="43" font-family="monospace" font-size="7" fill="#4a7090">▸ Duplicate + Network detect</text>
    <text x="15" y="54" font-family="monospace" font-size="7" fill="#4a7090">▸ Timing anomaly analysis</text>
    <circle cx="205" cy="10" r="4" fill="#ff4444" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Celery parallel label -->
  <rect x="240" y="470" width="110" height="16" rx="8" fill="#1a0a00" stroke="#ffaa00" stroke-width="1"/>
  <text x="295" y="482" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffaa00">⚡ CELERY PARALLEL</text>

  <!-- ===== RIGHT SIDE: SETTLEMENT + HITL ===== -->
  
  <!-- Settlement Agent -->
  <text x="520" y="200" font-family="monospace" font-size="9" fill="#006040" letter-spacing="2">AGENT 05</text>
  
  <g transform="translate(510, 210)" filter="url(#softglow)">
    <rect x="0" y="0" width="210" height="120" rx="10" fill="#051505" stroke="#00ff88" stroke-width="2"/>
    <rect x="0" y="0" width="210" height="25" rx="10" fill="#082010"/>
    <rect x="0" y="15" width="210" height="10" fill="#082010"/>
    <text x="105" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88" font-weight="bold" letter-spacing="1">SETTLEMENT AGENT</text>
    <text x="15" y="45" font-family="monospace" font-size="8" fill="#4a7090">▸ Payout calculator</text>
    <text x="15" y="57" font-family="monospace" font-size="8" fill="#4a7090">▸ Deductible logic</text>
    <text x="15" y="69" font-family="monospace" font-size="8" fill="#4a7090">▸ ReportLab PDF generator</text>
    <text x="15" y="81" font-family="monospace" font-size="8" fill="#4a7090">▸ APPROVE / REJECT decision</text>
    <text x="15" y="95" font-family="monospace" font-size="8" fill="#4a7090">▸ Email notification (SMTP)</text>
    <text x="15" y="109" font-family="monospace" font-size="8" fill="#00ff88">▸ → Settlement PDF to claimant</text>
    <circle cx="195" cy="12" r="5" fill="#00ff88" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- HITL Agent -->
  <text x="520" y="380" font-family="monospace" font-size="9" fill="#806000" letter-spacing="2">AGENT 06</text>

  <g transform="translate(510, 390)" filter="url(#softglow)">
    <rect x="0" y="0" width="210" height="100" rx="10" fill="#1a1000" stroke="#ffaa00" stroke-width="2"/>
    <rect x="0" y="0" width="210" height="25" rx="10" fill="#251800"/>
    <rect x="0" y="15" width="210" height="10" fill="#251800"/>
    <text x="105" y="17" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffaa00" font-weight="bold" letter-spacing="1">HUMAN-IN-THE-LOOP</text>
    <text x="15" y="45" font-family="monospace" font-size="8" fill="#4a7090">▸ WebSocket push to dashboard</text>
    <text x="15" y="57" font-family="monospace" font-size="8" fill="#4a7090">▸ Adjuster decision interface</text>
    <text x="15" y="69" font-family="monospace" font-size="8" fill="#4a7090">▸ APPROVED / REJECTED / MORE_INFO</text>
    <text x="15" y="83" font-family="monospace" font-size="8" fill="#ffaa00">▸ Real-time case assignment</text>
    <circle cx="195" cy="12" r="5" fill="#ffaa00" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right side: LangGraph Orchestrator box -->
  <g transform="translate(780, 150)">
    <rect x="0" y="0" width="280" height="340" rx="12" fill="#080c18" stroke="#2a3a50" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="140" y="25" text-anchor="middle" font-family="monospace" font-size="11" fill="#2a4060" letter-spacing="3">ORCHESTRATION</text>
    
    <!-- LangGraph box -->
    <rect x="15" y="40" width="250" height="55" rx="8" fill="#0a1525" stroke="#00d4ff" stroke-width="1"/>
    <text x="125" y="60" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" font-weight="bold">⚙ LangGraph</text>
    <text x="125" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7090">State machine + checkpointing</text>
    <text x="125" y="86" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7090">Conditional edges + parallelism</text>

    <!-- Claude tool_use box -->
    <rect x="15" y="110" width="250" height="55" rx="8" fill="#0a1525" stroke="#a78bfa" stroke-width="1"/>
    <text x="125" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="bold">🤖 Claude tool_use</text>
    <text x="125" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7090">claude-3-5-sonnet — Anthropic SDK</text>
    <text x="125" y="156" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7090">Observe → reason → tool → output</text>

    <!-- FastAPI box -->
    <rect x="15" y="180" width="115" height="55" rx="8" fill="#0a1525" stroke="#60a5fa" stroke-width="1"/>
    <text x="72" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" font-weight="bold">⚡ FastAPI</text>
    <text x="72" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">Async REST + WS</text>
    <text x="72" y="226" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">SQLAlchemy + PG</text>

    <!-- Celery box -->
    <rect x="150" y="180" width="115" height="55" rx="8" fill="#0a1525" stroke="#ff6b35" stroke-width="1"/>
    <text x="207" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6b35" font-weight="bold">🌿 Celery</text>
    <text x="207" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">Redis broker</text>
    <text x="207" y="226" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">Parallel tasks</text>

    <!-- Next.js box -->
    <rect x="15" y="250" width="115" height="55" rx="8" fill="#0a1525" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    <text x="72" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0" font-weight="bold">▲ Next.js 15</text>
    <text x="72" y="284" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">React 19 + WS</text>
    <text x="72" y="296" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">Tailwind v4</text>

    <!-- Pinecone box -->
    <rect x="150" y="250" width="115" height="55" rx="8" fill="#0a1525" stroke="#10b981" stroke-width="1"/>
    <text x="207" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">🌲 Pinecone</text>
    <text x="207" y="284" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">Hybrid search</text>
    <text x="207" y="296" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7090">BM25 + Dense</text>

    <text x="140" y="325" text-anchor="middle" font-family="monospace" font-size="8" fill="#2a4060">Python 74.9% · TypeScript 18.8% · Docker</text>
  </g>

  <!-- Connecting lines from agents to orchestrator -->
  <line x1="220" y1="255" x2="510" y2="280" stroke="#00d4ff" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="460" y1="255" x2="510" y2="280" stroke="#ff4444" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="615" y1="280" x2="780" y2="280" stroke="#00ff88" stroke-width="1" stroke-dasharray="5,4" opacity="0.3" marker-end="url(#arrowGreen)"/>

  <!-- Output section -->
  <g transform="translate(510, 510)">
    <rect x="0" y="0" width="500" height="70" rx="10" fill="#080c18" stroke="#2a3a50" stroke-width="1"/>
    <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="10" fill="#2a4060" letter-spacing="3">OUTPUTS</text>
    
    <rect x="10" y="28" width="100" height="30" rx="6" fill="#003320" stroke="#00ff88" stroke-width="1"/>
    <text x="60" y="47" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ff88" font-weight="bold">✓ APPROVED</text>
    
    <rect x="120" y="28" width="100" height="30" rx="6" fill="#330000" stroke="#ff4444" stroke-width="1"/>
    <text x="170" y="47" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444" font-weight="bold">✗ REJECTED</text>
    
    <rect x="230" y="28" width="110" height="30" rx="6" fill="#1a1500" stroke="#ffaa00" stroke-width="1"/>
    <text x="285" y="47" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffaa00" font-weight="bold">👤 ESCALATED</text>
    
    <rect x="350" y="28" width="140" height="30" rx="6" fill="#0d1e35" stroke="#00d4ff" stroke-width="1"/>
    <text x="420" y="47" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4ff" font-weight="bold">📄 settlement.pdf</text>
  </g>

  <!-- Animated data flow particles on main vertical line -->
  <circle cx="120" cy="195" r="4" fill="#00d4ff" opacity="0">
    <animate attributeName="cy" values="195;300;300;360;450;490;520" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
