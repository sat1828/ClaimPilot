  <text x="235" y="421" font-family="monospace" font-size="10" fill="#00d4ff">CLM-2044</text>
  <text x="335" y="421" font-family="monospace" font-size="10" fill="#4a7090">Auto</text>
  <text x="415" y="421" font-family="monospace" font-size="10" fill="#e2e8f0">Karan Mehta</text>
