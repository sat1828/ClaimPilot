    <text x="225" y="78" font-family="monospace" font-size="8" fill="#00ff88">76.5% approval rate</text>

    <!-- Card 3: Fraud Flagged -->
    <rect x="410" y="0" width="190" height="90" rx="10" fill="url(#cardGrad1)" stroke="#1a2a3a" stroke-width="1"/>
