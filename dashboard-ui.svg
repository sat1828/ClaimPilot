    <text x="35" y="22" font-family="monospace" font-size="11" fill="#00d4ff">⊞  Dashboard</text>
    
    <text x="35" y="68" font-family="monospace" font-size="11" fill="#4a6080">📋  All Claims</text>
    <text x="35" y="104" font-family="monospace" font-size="11" fill="#4a6080">👤  Human Review</text>
    <!-- Badge on Human Review -->
