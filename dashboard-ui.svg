<svg viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg" width="1100" height="650">
  <defs>
    <linearGradient id="dashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18"/>
      <stop offset="100%" style="stop-color:#060a14"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1525"/>
      <stop offset="100%" style="stop-color:#071020"/>
    </linearGradient>
    <filter id="dashGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="dashClip">
      <rect width="1100" height="650" rx="12"/>
    </clipPath>
  </defs>

  <!-- Window chrome -->
  <rect width="1100" height="650" rx="12" fill="#1a1a2e"/>
  <rect width="1100" height="650" rx="12" fill="url(#dashBg)" clip-path="url(#dashClip)"/>
  
  <!-- Title bar -->
  <rect width="1100" height="36" fill="#060a14"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="6" fill="#febc2e"/>
  <circle cx="56" cy="18" r="6" fill="#28c840"/>
  <text x="550" y="23" text-anchor="middle" font-family="monospace" font-size="11" fill="#2a4060" letter-spacing="4">ClaimPilot Dashboard — localhost:3000</text>

  <!-- Sidebar -->
  <rect x="0" y="36" width="200" height="614" fill="url(#sidebarGrad)" />
  <line x1="200" y1="36" x2="200" y2="650" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Logo in sidebar -->
