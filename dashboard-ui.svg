    <text x="22" y="122" font-family="monospace" font-size="7" fill="#4a6080">Weather: Light rain.</text>
    <text x="22" y="132" font-family="monospace" font-size="7" fill="#4a6080">Incident: Confirmed.</text>
    <line x1="10" y1="112" x2="10" y2="148" stroke="#1a2a3a" stroke-width="1"/>

