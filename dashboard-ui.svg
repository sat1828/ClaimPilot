    <text x="155" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff" font-weight="bold">3</text>
    
    <text x="35" y="140" font-family="monospace" font-size="11" fill="#4a6080">🔍  Fraud Reports</text>
    <text x="35" y="176" font-family="monospace" font-size="11" fill="#4a6080">📄  Audit Trail</text>
