  <text x="100" y="93" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ffffff" font-weight="bold" letter-spacing="2">PILOT</text>
  <line x1="20" y1="102" x2="180" y2="102" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Sidebar nav items -->
