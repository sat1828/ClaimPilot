  <text x="20" y="639" font-family="monospace" font-size="8" fill="#2a4060">ClaimPilot v1.0.0 — FastAPI 0.115 — LangGraph 0.2 — Next.js 15 — claude-3-5-sonnet</text>
  <circle cx="1070" cy="635" r="5" fill="#00ff88" opacity="0.8">
